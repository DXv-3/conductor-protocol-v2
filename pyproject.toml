[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"

[tool.mypy]
python_version = "3.10"
strict = false
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
files = [
    "brain_integration.py",
    "brain_query_before_route.py",
]

[tool.mypy.overrides]
module = ["rich.*"]
ignore_missing_imports = true
